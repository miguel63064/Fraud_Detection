version: "2.4"

services:

  mlflow:
    image: python:3.11-slim
    container_name: fraud-mlflow
    working_dir: /mlflow
    command:
      - bash
      - -c
      - "pip install --quiet mlflow==2.10.0 && mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri file:///mlflow/mlruns --default-artifact-root file:///mlflow/mlruns"
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlflow/mlruns
    environment:
      GUNICORN_CMD_ARGS: "--bind=0.0.0.0:5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  api:
    build: .
    container_name: fraud-api
    ports:
      - "8000:8000"
    volumes:
      - ./mlruns:/app/mlruns
    environment:
      MLFLOW_TRACKING_URI: file:///app/mlruns
      MLFLOW_EXPERIMENT_NAME: fraud_detection
      FRAUD_API_KEY: ${FRAUD_API_KEY}
    depends_on:
      mlflow:
        condition: service_healthy
    restart: unless-stopped
