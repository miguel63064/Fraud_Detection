[pytest]
# Configuração do pytest

# Diretórios de testes
testpaths = tests

# Padrão de arquivos de teste
python_files = test_*.py

# Padrão de classes de teste
python_classes = Test*

# Padrão de funções de teste
python_functions = test_*

# Mostrar saída de print
addopts = -v --tb=short --strict-markers -ra

# Markers customizados
markers =
    unit: Testes unitários
    integration: Testes de integração
    smoke: Testes smoke
    slow: Testes lentos
    data_quality: Testes de qualidade de dados
    model_quality: Testes de qualidade do modelo
    regression: Testes de regressão

# Timeout padrão para testes (30 segundos)
timeout = 30

# Configuração de logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Coleção de testes
console_output_style = progress
