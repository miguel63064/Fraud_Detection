name: CI/CD Pipeline - Fraud Detection

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC

env:
  PYTHON_VERSION: '3.11'
  CACHE_VERSION: v1

jobs:
  # Job 1: Linting e Formatação
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4  # fix: v3 → v4

      - name: Set up Python
        uses: actions/setup-python@v5  # fix: v4 → v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black pylint isort mypy

      - name: Run flake8
        run: |
          flake8 src/ tests/ main.py --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 src/ tests/ main.py --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics
        continue-on-error: true

      - name: Check Black formatting
        run: black --check src/ tests/ main.py
        continue-on-error: true

      - name: Run isort check
        run: isort --check-only src/ tests/ main.py
        continue-on-error: true

  # Job 2: Testes Unitários e de Integração
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    steps:
      - uses: actions/checkout@v4  # fix: v3 → v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5  # fix: v4 → v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-mock pytest-timeout pytest-xdist  # pytest-timeout já aqui

      - name: Run unit tests with coverage
        run: |
          pytest tests/ \
            --cov=src \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term \
            -v \
            --tb=short \
            -x

      - name: Upload coverage reports
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  # Job 3: Testes de Qualidade de Dados
  data-quality:
    name: Data Quality Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4  # fix: v3 → v4

      - name: Set up Python
        uses: actions/setup-python@v5  # fix: v4 → v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-mock pytest-timeout  # fix: pytest-timeout em falta

      - name: Run data quality tests
        run: |
          pytest tests/test_data.py -v --tb=short -m "data_quality or not model_quality"

  # Job 4: Testes de Modelo (Performance)
  model-quality:
    name: Model Quality Tests
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4  # fix: v3 → v4

      - name: Set up Python
        uses: actions/setup-python@v5  # fix: v4 → v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-mock pytest-timeout  # fix: pytest-timeout em falta

      - name: Run model quality tests
        run: |
          pytest tests/test_models.py tests/test_evaluation.py \
            -v --tb=short -m "model_quality or not data_quality" \
            --timeout=180
        timeout-minutes: 5

  # Job 5: Testes de Feature Engineering
  feature-tests:
    name: Feature Engineering Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4  # fix: v3 → v4

      - name: Set up Python
        uses: actions/setup-python@v5  # fix: v4 → v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-mock pytest-timeout  # fix: pytest-timeout em falta

      - name: Run feature engineering tests
        run: |
          pytest tests/test_feature_engineer.py -v --tb=short

  # Job 6: Security Check
  security:
    name: Security & Secrets Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4  # fix: v3 → v4

      - name: Set up Python
        uses: actions/setup-python@v5  # fix: v4 → v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety

      - name: Run Bandit (security issues)
        run: bandit -r src/ -f json -o bandit-report.json || true

      - name: Check for hardcoded secrets
        run: |
          if grep -r "api_key\|password\|secret" src/ --include="*.py" | grep -v "#"; then
            echo "⚠️  Possíveis secrets encontrados!"
            exit 1
          fi
        continue-on-error: true

      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v4  # já estava correto
        with:
          name: security-report
          path: bandit-report.json

  # Job 7: Smoke Tests (rápidos)
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4  # fix: v3 → v4

      - name: Set up Python
        uses: actions/setup-python@v5  # fix: v4 → v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-timeout  # fix: pytest-timeout em falta

      - name: Run smoke tests
        run: pytest tests/ -m smoke -v --tb=short

  # Job 8: Relatório Final
  test-report:
    name: Test Report
    runs-on: ubuntu-latest
    needs: [lint, test, data-quality, model-quality, feature-tests, security, smoke-tests]
    if: always()
    steps:
      - uses: actions/checkout@v4  # fix: v3 → v4

      - name: Create test summary
        run: |
          echo "## 🧪 CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Linting | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Data Quality | ${{ needs.data-quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Model Quality | ${{ needs.model-quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Feature Tests | ${{ needs.feature-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke Tests | ${{ needs.smoke-tests.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail if critical jobs failed
        if: |
          needs.lint.result == 'failure' ||
          needs.test.result == 'failure' ||
          needs.model-quality.result == 'failure'
        run: exit 1